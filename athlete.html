<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Meu dia</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell athlete-view">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content page-with-actionbar">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Meu dia</strong>
      <div></div>
    </div>

    <div class="topbar athlete-topbar">
      <div>
        <h1 data-page-title>Meu dia</h1>
        <p data-page-subtitle></p>
      </div>
      <div class="header-actions">
        <span class="status-pill muted" id="todayDate"></span>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <section class="card action-card checkin-focus">
      <div class="action-card-head">
        <div>
          <span class="eyebrow">Registrar Posição</span>
          <h2 class="action-title">Check-In</h2>
          <p class="action-subtitle">Olá, <span id="athleteName"></span></p>
        </div>
        <span class="athlete-accent-dot" id="athleteAccent"></span>
      </div>
      <div class="checkin-actions desktop-actions">
        <button id="gpsCheckinButton" class="primary-button large-button" type="button">Usar localização atual</button>
        <button id="openManualCheckin" class="secondary-button large-button" type="button">Registrar manualmente</button>
      </div>
    </section>

    <section class="summary-strip">
      <article class="summary-card">
        <span class="summary-label">Check-ins do dia</span>
        <strong class="summary-value" id="todayCount">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-label">Planos na semana</span>
        <strong class="summary-value" id="weekPlansCount">0</strong>
      </article>
      <article class="summary-card status-card-inline">
        <span class="summary-label">Status do dia</span>
        <strong class="summary-status" id="todayStatusText">Pendente</strong>
        <span class="summary-detail" id="todayStatusMeta">Nenhum check-in realizado hoje</span>
      </article>
    </section>

    <div class="athlete-layout-grid">
      <section class="card compact">
        <div class="section-head-inline">
          <div>
            <h2 class="card-title">Histórico de hoje</h2>
          </div>
        </div>
        <div id="historyContainer" class="list-stack simple-history"></div>
      </section>

      <section class="card compact">
        <div class="section-head-inline">
          <div>
            <h2 class="card-title">Planos cadastrados na semana</h2>
          </div>
          <a class="secondary-button" href="plans.html?new=1">Adicionar novo plano</a>
        </div>
        <div id="weekPlans" class="list-stack"></div>
      </section>
    </div>
  </main>

  <div id="manualCheckinModal" class="modal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 class="card-title" id="manualModalTitle">Check-in manual</h2>
        </div>
        <button type="button" class="modal-close" data-close-manual>×</button>
      </div>
      <div id="manualNotice" class="notice hidden"></div>
      <form id="manualCheckinForm">
        <input type="hidden" id="manualCheckinId" name="manualCheckinId">
        <datalist id="countryOptions"></datalist>
        <datalist id="stateOptions"></datalist>
        <datalist id="cityOptions"></datalist>
        <div class="form-grid">
          <div class="field">
            <label for="country">País</label>
            <input id="country" name="country" list="countryOptions" autocomplete="off" required>
          </div>
          <div class="field">
            <label for="state_region">Estado / Província</label>
            <input id="state_region" name="state_region" list="stateOptions" autocomplete="off" placeholder="Informe o estado / província">
          </div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="city">Cidade</label>
            <input id="city" name="city" list="cityOptions" autocomplete="off" required placeholder="Informe a cidade">
          </div>
          <div class="field">
            <label for="location_name">Local</label>
            <input id="location_name" name="location_name" required>
          </div>
        </div>
        <div class="field">
          <label for="observation">Observação</label>
          <textarea id="observation" name="observation"></textarea>
        </div>
        <div class="button-row modal-actions-end">
          <button class="secondary-button" type="button" data-close-manual>Cancelar</button>
          <button class="primary-button" id="manualSubmitButton" type="submit">Salvar check-in</button>
        </div>
      </form>
    </div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-card password-card">
      <div class="modal-header">
        <div>
          <h2 class="card-title">Alterar senha</h2>
        </div>
        <button type="button" class="modal-close" data-close-password>×</button>
      </div>
      <div id="passwordNotice" class="notice hidden"></div>
      <form id="passwordForm">
        <div class="field">
          <label for="newPassword">Nova senha</label>
          <input id="newPassword" name="newPassword" type="password" minlength="6" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirmar nova senha</label>
          <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>
        </div>
        <div class="button-row modal-actions-end">
          <button class="secondary-button" type="button" data-close-password>Cancelar</button>
          <button class="primary-button" type="submit">Salvar senha</button>
        </div>
      </form>
    </div>
  </div>

  <div class="mobile-actionbar">
    <button id="gpsCheckinButtonMobile" class="primary-button" type="button">Usar localização atual</button>
    <button id="openManualCheckinMobile" class="secondary-button" type="button">Registrar manualmente</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="athlete.js"></script>
</body>
</html>
