<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Mapa Geral</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-map-card { margin-top: 18px; }
    .admin-map-card .card-header { margin-bottom: 10px; }
    .admin-summary-compact {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      background: rgba(255,255,255,0.92);
      display: grid;
      gap: 8px;
    }
    .admin-summary-line {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      color: #3d4654;
      font-size: .95rem;
    }
    .admin-summary-line strong { color: #12161f; }
    .admin-summary-list {
      color: #566071;
      line-height: 1.5;
      font-size: .92rem;
      word-break: break-word;
    }
    .admin-summary-list strong { color: #12161f; }
    .admin-map-note {
      color: #68707d;
      font-size: .85rem;
      margin-top: 2px;
    }
    .admin-spider-cluster {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #14161b;
      color: #fff;
      border: 2px solid #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
    }
    .admin-spider-pin {
      box-shadow: 0 4px 10px rgba(0,0,0,.14);
    }
    @media (max-width: 900px) {
      #map { height: 520px !important; }
      .admin-summary-line { gap: 12px; }
    }
  </style>
</head>
<body class="app-shell">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Mapa Geral</strong>
      <div></div>
    </div>

    <div class="topbar">
      <div>
        <h1 data-page-title>Mapa Geral</h1>
        <p data-page-subtitle></p>
      </div>
      <div class="header-actions">
        <button id="refreshDashboard" class="primary-button" type="button">Atualizar painel</button>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <section class="card admin-map-card">
      <div class="card-header">
        <div>
          <h2 class="card-title">Mapa operacional do dia</h2>
        </div>
      </div>
      <div id="athleteLegend" class="legend" style="margin-bottom:12px;"></div>
      <div id="map" style="height:640px;"></div>
      <div class="admin-summary-compact">
        <div class="admin-summary-line">
          <span><strong id="metricAthletes">0</strong> atletas ativos</span>
          <span><strong id="metricPending">0</strong> sem check-in hoje</span>
        </div>
        <div class="admin-summary-list">
          <strong>Check-in:</strong>
          <span id="activeAthletesInline">—</span>
        </div>
        <div class="admin-summary-list">
          <strong>Pendentes:</strong>
          <span id="pendingAthletesInline">—</span>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Último check-in do dia</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Horário</th>
              <th>Tipo</th>
              <th>País</th>
              <th>Cidade</th>
              <th>Local</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="checkinsTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Planos vigentes da semana</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Período</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Motivo</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="plansTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
