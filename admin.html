<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Mapa Geral</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-summary-compact {
      margin-top: 18px;
      padding: 16px 20px;
    }
    .admin-summary-line {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      font-size: 0.95rem;
    }
    .admin-summary-line + .admin-summary-line {
      margin-top: 8px;
      color: var(--muted);
    }
    .admin-summary-line strong {
      color: var(--text);
      font-weight: 800;
    }
    .map-first-card #map {
      height: 640px;
    }
    .athlete-marker {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 3px solid #ffffff;
      box-shadow: 0 4px 12px rgba(15,23,42,.28);
    }
    .custom-cluster {
      background: rgba(20, 22, 27, 0.92);
      color: #fff;
      border: 3px solid #fff;
      border-radius: 999px;
      box-shadow: 0 10px 26px rgba(15,23,42,.25);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 0.9rem;
    }
    .custom-cluster.small { width: 34px; height: 34px; }
    .custom-cluster.medium { width: 40px; height: 40px; }
    .custom-cluster.large { width: 46px; height: 46px; }
    @media (max-width: 900px) {
      .map-first-card #map { height: 500px; }
      .admin-summary-line { gap: 14px; }
    }
  </style>
</head>
<body class="app-shell">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Mapa Geral</strong>
      <div></div>
    </div>

    <div class="topbar">
      <div>
        <h1 data-page-title>Mapa Geral</h1>
        <p data-page-subtitle></p>
      </div>
      <div class="header-actions">
        <button id="refreshDashboard" class="primary-button" type="button">Atualizar painel</button>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <section class="card map-first-card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Mapa operacional do dia</h2>
        </div>
      </div>
      <div id="athleteLegend" class="legend" style="margin-bottom:12px;"></div>
      <div id="map"></div>
    </section>

    <section class="card admin-summary-compact">
      <div class="admin-summary-line">
        <span><strong id="metricAthletes">0</strong> ativos</span>
        <span><strong id="metricPending">0</strong> sem check-in</span>
      </div>
      <div class="admin-summary-line">
        <strong>Check-in:</strong>
        <span id="activeAthletesInline">—</span>
      </div>
      <div class="admin-summary-line">
        <strong>Pendentes:</strong>
        <span id="pendingAthletesInline">—</span>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Último check-in do dia</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Horário</th>
              <th>Tipo</th>
              <th>País</th>
              <th>Cidade</th>
              <th>Local</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="checkinsTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Planos vigentes da semana</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Período</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Motivo</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="plansTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
