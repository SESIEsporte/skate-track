<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Mapa Geral</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Mapa Geral</strong>
      <div></div>
    </div>

    <div class="topbar">
      <div>
        <h1 data-page-title>Mapa Geral</h1>
        <p data-page-subtitle></p>
      </div>
      <div class="header-actions">
        <button id="refreshDashboard" class="primary-button" type="button">Atualizar painel</button>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <section class="card" style="margin-top:18px;">
      <div class="card-header" style="margin-bottom:14px;">
        <div>
          <h2 class="card-title">Mapa operacional do dia</h2>
        </div>
      </div>
      <div id="athleteLegend" class="legend" style="margin-bottom:12px;"></div>
      <div id="map" style="height:680px;"></div>
    </section>

    <section class="card compact" style="margin-top:18px; padding:16px 18px;">
      <div style="display:grid; gap:10px;">
        <div style="display:flex; gap:18px; flex-wrap:wrap; align-items:center; font-size:14px;">
          <span><strong id="metricAthletes">0</strong> atletas ativos</span>
          <span><strong id="metricPending">0</strong> sem check-in hoje</span>
        </div>
        <div style="display:grid; gap:8px; font-size:14px; color:#3f4754;">
          <div>
            <strong style="color:#14161b;">Check-in hoje:</strong>
            <span id="activeAthletesInline">—</span>
          </div>
          <div>
            <strong style="color:#14161b;">Pendentes:</strong>
            <span id="pendingAthletesInline">—</span>
          </div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Último check-in do dia</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Horário</th>
              <th>Tipo</th>
              <th>País</th>
              <th>Cidade</th>
              <th>Local</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="checkinsTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Planos vigentes da semana</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Atleta</th>
              <th>Período</th>
              <th>Origem</th>
              <th>Destino</th>
              <th>Motivo</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody id="plansTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
