<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Atletas</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Atletas</strong>
      <div></div>
    </div>

    <div class="topbar">
      <div>
        <h1 data-page-title>Atletas</h1>
        <p data-page-subtitle></p>
      </div>
      <div class="header-actions">
        <div class="field" style="min-width:260px; margin:0;">
          <label for="searchAthlete">Buscar atleta</label>
          <input id="searchAthlete" type="search">
        </div>
        <button id="openNewAthlete" class="primary-button" type="button">Novo atleta</button>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <div class="grid grid-2">
      <section class="card compact metric-card"><span class="metric-label">Atletas ativos</span><div class="metric-value" id="activeAthletesCount">0</div></section>
    </div>

    <section class="card" style="margin-top:18px;">
      <div class="card-header">
        <div>
          <h2 class="card-title">Base administrativa</h2>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Usuário</th>
              <th>Status</th>
                            <th>Último check-in</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="athletesTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal" id="athleteModal">
    <div class="modal-card large">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle" style="margin:0;"></h2>
          <p id="modalSubtitle" class="muted" style="margin:6px 0 0;"></p>
        </div>
        <button class="modal-close" data-close-modal type="button">×</button>
      </div>
      <div id="modalNotice" class="notice hidden"></div>
      <form id="athleteForm">
        <input type="hidden" name="id">
        <section class="card compact">
          <div class="card-header">
            <div>
              <h3 class="card-title">Dados pessoais</h3>
              <p class="card-subtitle">Cadastro administrativo do atleta.</p>
            </div>
          </div>
          <div class="form-grid">
            <div class="field"><label>Nome completo</label><input name="full_name" required></div>
            <div class="field"><label>Nome social</label><input name="social_name"></div>
          </div>
          <div class="form-grid">
            <div class="field"><label>Usuário</label><input name="username" required></div>
            <div class="field"><label>Senha inicial</label><input name="initial_password" type="password" minlength="6"></div>
          </div>
          <div class="form-grid">
            <div class="field"><label>Sexo</label>
              <select name="sex">
                <option value="">Selecionar</option>
                <option value="F">F</option>
                <option value="M">M</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="field"><label>Status</label>
              <select name="active">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
              </select>
            </div>
          </div>
        </section>
        <div class="button-row" style="margin-top:18px; justify-content:flex-end;">
          <button class="ghost-button" type="button" data-close-modal>Fechar</button>
          <button class="primary-button" type="submit">Salvar atleta</button>
        </div>
      </form>
    </div>
  </div>


  <footer class="legal-footer">
    <a href="privacy.html">Política de Privacidade</a>
    <a href="terms.html">Termos de Uso</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="athletes.js"></script>
</body>
</html>
