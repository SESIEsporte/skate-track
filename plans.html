<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Meus planos</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <aside class="sidebar"></aside>
  <div class="drawer-overlay"></div>
  <main class="content">
    <div class="mobile-topbar">
      <button data-menu-open aria-label="Abrir menu">☰</button>
      <strong data-mobile-title>Meus planos</strong>
      <div></div>
    </div>

    <div class="topbar">
      <div>
        <h1 data-page-title>Meus planos</h1>
        <p data-page-subtitle></p>
      </div>
    </div>

    <div id="pageNotice" class="notice hidden"></div>

    <div class="grid grid-3">
      <section class="card compact metric-card"><span class="metric-label">Planos cadastrados</span><div class="metric-value" id="plansCount">0</div></section>
      <section class="card compact metric-card"><span class="metric-label">Planos ativos</span><div class="metric-value" id="activePlansCount">0</div></section>
      <section class="card compact metric-card"><span class="metric-label">Próxima janela</span><div class="metric-value" id="nextWindow">—</div></section>
    </div>

    <div class="grid grid-2" style="margin-top:18px; align-items:start;">
      <section class="card">
        <div class="card-header">
          <div>
            <h2 class="card-title">Novo plano de deslocamento</h2>
            <p class="card-subtitle">Previsão administrativa e logística. O plano não substitui o check-in operacional.</p>
          </div>
        </div>
        <form id="planForm">
          <div class="form-grid">
            <div class="field">
              <label for="start_date">Data inicial</label>
              <input id="start_date" name="start_date" type="date" required>
            </div>
            <div class="field">
              <label for="end_date">Data final</label>
              <input id="end_date" name="end_date" type="date" required>
            </div>
          </div>

          <div class="notice">Origem</div>
          <div class="form-grid-3">
            <div class="field"><label for="origin_country">País</label><input id="origin_country" name="origin_country" required></div>
            <div class="field"><label for="origin_state">Estado / Região</label><input id="origin_state" name="origin_state"></div>
            <div class="field"><label for="origin_city">Cidade</label><input id="origin_city" name="origin_city" required></div>
          </div>

          <div class="notice">Destino</div>
          <div class="form-grid-3">
            <div class="field"><label for="destination_country">País</label><input id="destination_country" name="destination_country" required></div>
            <div class="field"><label for="destination_state">Estado / Região</label><input id="destination_state" name="destination_state"></div>
            <div class="field"><label for="destination_city">Cidade</label><input id="destination_city" name="destination_city" required></div>
          </div>

          <div class="field"><label for="travel_reason">Motivo do deslocamento</label><input id="travel_reason" name="travel_reason" required></div>
          <div class="field"><label for="notes">Observação</label><textarea id="notes" name="notes"></textarea></div>
          <button class="primary-button" type="submit">Salvar plano</button>
        </form>
      </section>

      <section class="card">
        <div class="card-header">
          <div>
            <h2 class="card-title">Planos registrados</h2>
            <p class="card-subtitle">Lista real em ordem por data inicial.</p>
          </div>
        </div>
        <div id="plansList" class="list-stack"></div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="plans.js"></script>
</body>
</html>
