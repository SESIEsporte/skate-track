<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkateTrack | Acesso</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page login-page-minimal">
  <main class="login-minimal-shell" aria-label="Acesso ao SkateTrack">
    <section class="login-minimal-card">
      <div class="login-minimal-brand">
        <img src="logo.svg" alt="SkateTrack">
        <h1>SkateTrack</h1>
      </div>

      <div id="loginNotice" class="notice hidden"></div>

      <form id="loginForm" class="login-minimal-form">
        <div class="field">
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button id="loginSubmit" class="primary-button login-submit-button" type="submit">Entrar</button>
      </form>
      <div class="login-help">
  Em caso de esquecimento de senha, entrar em contato com 
        <a href="mailto:supervisao.esporte@sesisenaisp.onmicrosoft.com">
    supervisao.esporte@sesisenaisp.onmicrosoft.com
        </a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="common.js"></script>
  <script src="auth.js"></script>
</body>
</html>
